<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – ScamShield AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="login-body">
    <div class="animated-bg"></div>
    <div class="particles">
        <span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span>
    </div>
    <div class="login-container">
        <div class="login-card">
            <div class="pulse-ring"></div>
            <div class="shield-icon">
                <i class="fa-solid fa-shield-halved"></i>
            </div>
            <h1>Welcome Back</h1>
            <p class="login-subtitle">Secure AI Protection System</p>

            <div class="input-group">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" id="email" placeholder="Enter your email">
            </div>
            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password" placeholder="Enter password">
            </div>

            <button id="loginBtn">
                <i class="fa-solid fa-right-to-bracket"></i> Login Securely
            </button>
            <br><br>
            <button id="registerBtn">
                <i class="fa-solid fa-user-plus"></i> Register New Account
            </button>
            <br><br>
            <p id="message"></p>

            <div class="login-stats">
                <div><h3>98%</h3><p>Accuracy</p></div>
                <div><h3>24/7</h3><p>Protection</p></div>
                <div><h3>12K+</h3><p>Threats</p></div>
            </div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='login.js') }}"></script>
</body>
</html>
